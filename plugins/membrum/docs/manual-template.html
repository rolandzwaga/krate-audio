<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membrum User Manual - Synthesized Drum Machine | Krate Audio</title>
    <meta name="description" content="Complete user manual for Membrum, a free open-source synthesized drum machine VST3 plugin with modal synthesis.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://rolandzwaga.github.io/krate-audio/membrum/manual.html">

    <!-- Open Graph -->
    <meta property="og:title" content="Membrum User Manual - Synthesized Drum Machine">
    <meta property="og:description" content="Complete user manual for Membrum, a free open-source synthesized drum machine VST3 plugin.">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://rolandzwaga.github.io/krate-audio/membrum/manual.html">
    <meta property="og:site_name" content="Krate Audio">
    <meta property="og:locale" content="en_US">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Membrum User Manual">
    <meta name="twitter:description" content="Complete user manual for Membrum, a free open-source synthesized drum machine VST3 plugin.">

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Base -- matches Membrum landing page */
        :root {
            --color-bg: #0a0a0f;
            --color-surface: #12121a;
            --color-border: #2a2a3a;
            --color-text: #e8e8f0;
            --color-text-muted: #8888a0;
            --color-accent: #c87850;
            --color-accent-hover: #e0946c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.7;
            min-height: 100vh;
        }

        .manual-container {
            max-width: 960px;
            margin: 0 auto;
            padding: 3rem 2rem 4rem;
        }

        .manual-header {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--color-border);
        }

        .manual-header .breadcrumb {
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }

        .manual-header .breadcrumb a {
            color: var(--color-text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .manual-header .breadcrumb a:hover {
            color: var(--color-accent);
        }

        .manual-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--color-text) 0%, var(--color-accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .manual-header .subtitle {
            color: var(--color-text-muted);
            font-size: 1.1rem;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 3rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--color-border);
        }

        h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 2rem 0 0.75rem;
            color: var(--color-accent-hover);
        }

        p { margin-bottom: 1rem; }

        a {
            color: var(--color-accent);
            text-decoration: none;
            transition: color 0.2s;
        }

        a:hover { color: var(--color-accent-hover); }

        ul, ol {
            margin-bottom: 1rem;
            padding-left: 1.5rem;
        }

        li { margin-bottom: 0.35rem; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            text-align: left;
            padding: 0.75rem 1rem;
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--color-accent-hover);
            border-bottom: 1px solid var(--color-border);
        }

        td {
            padding: 0.6rem 1rem;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--color-border);
        }

        tr:last-child td { border-bottom: none; }

        code {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.85em;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            padding: 0.125rem 0.375rem;
            border-radius: 4px;
        }

        .manual-footer {
            text-align: center;
            padding-top: 2rem;
            margin-top: 3rem;
            border-top: 1px solid var(--color-border);
            color: var(--color-text-muted);
            font-size: 0.875rem;
        }

        .manual-footer a {
            color: var(--color-text);
            text-decoration: none;
            transition: color 0.2s;
        }

        .manual-footer a:hover { color: var(--color-accent); }

        @media (max-width: 640px) {
            .manual-container { padding: 2rem 1rem; }
            .manual-header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="manual-container">
        <div class="manual-header">
            <p class="breadcrumb">
                <a href="../">Krate Audio</a> / <a href="./">Membrum</a>
            </p>
            <h1>Membrum -- User Manual</h1>
            <p class="subtitle">Synthesized Drum Machine</p>
        </div>

        $toc$
        $body$

        <div class="manual-footer">
            <p>
                <a href="./">Back to Membrum</a> |
                <a href="../">Krate Audio</a>
            </p>
        </div>
    </div>
</body>
</html>
