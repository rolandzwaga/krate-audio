<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krate Audio - Free Open-Source VST3 Plugins</title>
    <meta name="description" content="Free open-source VST3 audio plugins for music production and sound design. Delay, distortion, synthesizer, harmonic resynthesis, and step arpeggiator. Windows, macOS, Linux.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://rolandzwaga.github.io/krate-audio/">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

    <!-- Open Graph -->
    <meta property="og:title" content="Krate Audio - Free Open-Source VST3 Plugins">
    <meta property="og:description" content="Free open-source VST3 audio plugins for music production and sound design. Delay, distortion, synthesizer, harmonic resynthesis, and arpeggiator.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://rolandzwaga.github.io/krate-audio/">
    <meta property="og:site_name" content="Krate Audio">
    <meta property="og:locale" content="en_US">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Krate Audio - Free Open-Source VST3 Plugins">
    <meta name="twitter:description" content="Free open-source VST3 plugins: delay, distortion, synth, resynthesis, arpeggiator. Windows, macOS, Linux.">

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Krate Audio",
        "url": "https://rolandzwaga.github.io/krate-audio/",
        "description": "Free open-source VST3 audio plugins for music production and sound design.",
        "sameAs": [
            "https://github.com/{{REPO}}"
        ]
    }
    </script>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="assets/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>Krate Audio</h1>
            <p class="tagline">Weird and noisy open-source VST3 plugins for music production and sound design</p>
        </header>

        <section class="plugins">
            <h2>Plugins</h2>
            <div class="plugin-grid">
                {{PLUGIN_CARDS}}
            </div>
        </section>

        <footer>
            <p>
                <a href="https://github.com/{{REPO}}">GitHub</a> |
                <a href="https://github.com/{{REPO}}/releases">All Releases</a> |
                <a href="https://github.com/{{REPO}}/issues">Report Issue</a>
            </p>
            <p class="copyright">Krate Audio</p>
        </footer>
    </div>
</body>

</html>
