name: Valgrind Nightly

# ============================================================================
# Nightly Valgrind / memcheck run for the Membrum test suite.
# ============================================================================
# Catches memory errors that AddressSanitizer does NOT — specifically
# operator new/delete family mismatches and reads of uninitialised memory.
#
# Background: the Membrum suite once hit an intermittent SIGSEGV on the Linux
# CI runner. It was reported inside the voice-steal test but was actually a
# victim of cross-test heap corruption surfaced by Catch2's random ordering.
# Root cause: a global `operator delete` override in test_allocation_matrix.cpp
# freed a libstdc++-allocated std::string with std::free under
# -fvisibility=hidden (an "operator new vs free" mismatch). That is silent UB
# on a vanilla glibc heap and invisible to ASan (its own new/delete
# interceptors absorb the override), but corrupts allocator bookkeeping under
# other layouts.
#
# memcheck tracks every allocation's family precisely, so a single run catches
# such a mismatch deterministically, independent of test order. This is the
# regression guard for that class of bug.
#
# Why nightly (not per-PR): a full memcheck pass over the heavy DSP suite costs
# ~50x native (and --track-origins roughly doubles that) and can emit spurious
# "uninitialised value" reports on SIMD code, so running it on every PR would
# tax feedback and risk flaky reds. Nightly on `main` catches regressions
# within 24 h without that cost. Use the manual "Run workflow" button
# (workflow_dispatch) to run it on demand, e.g. before a release or when
# touching allocation-sensitive code.
#
# Sharding: the Membrum suite is ~107 s natively, which put a single memcheck
# pass past the 90 min step budget (it timed out on 2026-07-19). The run is
# split into 4 Catch2 shards, each a disjoint quarter of the TEST_CASEs, so no
# coverage is lost and the slowest shard is ~1/3 of the serial wall clock. If
# it creeps back toward the budget, raise the shard count -- do not simply
# raise the timeout.
#
# Idle-repo skip: the scheduled run is gated on the repository having been
# pushed to within the last 24 h (see the check-activity job). Re-running a
# long memcheck pass over an unchanged tree buys nothing, so on a quiet repo
# the schedule costs one cheap API call instead of several long jobs. A
# manual workflow_dispatch always runs, regardless of activity.
# ============================================================================

on:
  schedule:
    # 05:17 UTC daily (off-peak; odd minute avoids the top-of-hour stampede).
    - cron: '17 5 * * *'
  workflow_dispatch:
    inputs:
      rng_seed:
        description: 'Catch2 --rng-seed for the run order'
        type: string
        required: false
        default: '1099410096'

concurrency:
  group: valgrind-nightly
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUILD_TYPE: Release
  CCACHE_MAXSIZE: 500M
  CCACHE_COMPRESS: true
  CCACHE_COMPRESSLEVEL: 6

jobs:
  # ==========================================================================
  # Skip the scheduled run entirely when nothing has been pushed for 24 h.
  # ==========================================================================
  # Uses the repository's `pushed_at`, which is the timestamp of the most
  # recent push to ANY branch. That is the literal "has anyone touched this
  # repo" signal, so a run is skipped only when the whole repository has been
  # idle. (If you would rather gate on the branch actually being tested, swap
  # the API call for
  #     gh api "repos/$REPO/commits?sha=$BRANCH&since=$SINCE" --jq 'length'
  # and test for a non-zero count -- stricter, but it also skips when work
  # landed on feature branches only.)
  #
  # workflow_dispatch is never gated: the manual button exists precisely for
  # on-demand runs before a release, when the tree may well be untouched.
  # ==========================================================================
  check-activity:
    name: Check for recent pushes
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Determine whether the repo was pushed to in the last 24 h
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Manual run (${{ github.event_name }}) - activity gate not applied." \
              >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          PUSHED_AT="$(gh api "repos/$REPO" --jq '.pushed_at')"
          PUSHED_EPOCH="$(date -u -d "$PUSHED_AT" +%s)"
          NOW_EPOCH="$(date -u +%s)"
          AGE_SECONDS=$(( NOW_EPOCH - PUSHED_EPOCH ))
          AGE_HOURS=$(( AGE_SECONDS / 3600 ))

          if [ "$AGE_SECONDS" -lt 86400 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Last push $PUSHED_AT (${AGE_HOURS}h ago) - running valgrind." \
              >> "$GITHUB_STEP_SUMMARY"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Last push $PUSHED_AT (${AGE_HOURS}h ago) - repository idle for over 24h, skipping valgrind." \
              >> "$GITHUB_STEP_SUMMARY"
          fi

  valgrind-membrum:
    name: Linux Valgrind (Membrum, shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    needs: check-activity
    if: needs.check-activity.outputs.should_run == 'true'

    # Sharded because the suite outgrew a single 90 min memcheck budget.
    # memcheck costs ~50-80x native and --track-origins roughly doubles that,
    # so a ~60 s native suite lands near two hours on a CI runner. Catch2's
    # --shard-count splits at TEST_CASE granularity, so each shard runs a
    # disjoint quarter of the cases; together they still cover every test.
    # fail-fast is off so one bad shard does not hide errors in the others.
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: >-
            valgrind ninja-build libx11-dev libxcb1-dev libxkbcommon-x11-dev libx11-xcb-dev
            libxcb-util1 libxcb-util-dev libxcb-keysyms1-dev libxcb-cursor-dev
            libxcb-xkb-dev libxkbcommon-dev libfontconfig1-dev libfreetype6-dev
            libcairo2-dev libgtkmm-3.0-dev libsqlite3-dev
          version: 1.0

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.20
        with:
          key: linux-valgrind-${{ env.BUILD_TYPE }}
          max-size: ${{ env.CCACHE_MAXSIZE }}

      - name: Cache FetchContent
        uses: actions/cache@v5
        with:
          path: build-vg/_deps
          key: fetchcontent-${{ github.repository }}-${{ runner.os }}-vg-${{ hashFiles('CMakeLists.txt', 'dsp/CMakeLists.txt', 'plugins/shared/CMakeLists.txt', 'plugins/membrum/CMakeLists.txt', 'tests/CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-${{ github.repository }}-${{ runner.os }}-vg-

      # Plain Release (no sanitizer): valgrind instruments the unmodified binary.
      - name: Configure CMake (Release)
        run: |
          cmake -S . -B build-vg -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build membrum_tests
        run: cmake --build build-vg --parallel --target membrum_tests

      # One memcheck pass over each shard is enough: the new/delete family
      # mismatch is detected per-allocation, regardless of test order, so
      # splitting the suite across processes does not weaken the check.
      # --error-exitcode=99 turns any memcheck error (mismatched free, invalid
      # read/write, uninitialised use) into a job failure. Leak checking is off
      # — we only care about invalid accesses and mismatched frees, not the
      # static/"still reachable" allocations Catch2 keeps for the process
      # lifetime.
      - name: Run membrum_tests under Valgrind/memcheck (shard ${{ matrix.shard }})
        timeout-minutes: 90
        run: |
          BIN="build-vg/bin/${{ env.BUILD_TYPE }}/membrum_tests"
          test -x "$BIN" || { echo "FAIL: $BIN not found"; exit 1; }
          SEED="${{ github.event.inputs.rng_seed || '1099410096' }}"
          valgrind \
            --tool=memcheck \
            --error-exitcode=99 \
            --leak-check=no \
            --errors-for-leak-kinds=none \
            --track-origins=yes \
            --num-callers=25 \
            "$BIN" '~[performance]~[perf]~[benchmark]~[!benchmark]~[lifecycle]' --skip-benchmarks \
              --order rand --rng-seed "$SEED" \
              --shard-count 4 --shard-index ${{ matrix.shard }}

      - name: Show ccache stats
        if: always()
        run: ccache --show-stats

  # ==========================================================================
  # Editor open/close lifecycle under memcheck, for ALL plugins.
  # ==========================================================================
  # The shared harness (tests/test_helpers/editor_lifecycle_harness.h) drives
  # each plugin's VST3 editor through repeated IPlugView::attached()/removed()
  # cycles. attached() builds the real view tree from the .uidesc and runs the
  # controller's verifyView/didOpen/willClose delegate hooks -- the exact path
  # where editor-teardown use-after-free bugs live (e.g. a controller that frees
  # a view container and then dynamic_cast's its dangling child pointers).
  #
  # Why memcheck, not plain Release: the dangling read often hits freed-but-not-
  # reused memory, so a normal Release run passes by luck (which is why such
  # crashes only surface in a real DAW). memcheck flags the read of freed memory
  # deterministically.
  #
  # xvfb provides the X display the VSTGUI X11 platform factory needs.
  # --undef-value-errors=no suppresses the noisy "uninitialised value" reports
  # that X11/cairo/fontconfig emit, while keeping the addressability checks
  # (invalid read/write, mismatched free) that actually catch use-after-free.
  # ==========================================================================
  valgrind-editor-lifecycle:
    name: Linux Valgrind (Editor Lifecycle, all plugins)
    runs-on: ubuntu-latest
    needs: check-activity
    if: needs.check-activity.outputs.should_run == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: >-
            valgrind ninja-build xvfb libx11-dev libxcb1-dev libxkbcommon-x11-dev libx11-xcb-dev
            libxcb-util1 libxcb-util-dev libxcb-keysyms1-dev libxcb-cursor-dev
            libxcb-xkb-dev libxkbcommon-dev libfontconfig1-dev libfreetype6-dev
            libcairo2-dev libgtkmm-3.0-dev libsqlite3-dev
          version: 1.0

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.20
        with:
          key: linux-valgrind-editor-${{ env.BUILD_TYPE }}
          max-size: ${{ env.CCACHE_MAXSIZE }}

      - name: Cache FetchContent
        uses: actions/cache@v5
        with:
          path: build-vg-editor/_deps
          key: fetchcontent-${{ github.repository }}-${{ runner.os }}-vgedit-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-${{ github.repository }}-${{ runner.os }}-vgedit-

      - name: Configure CMake (Release)
        run: |
          cmake -S . -B build-vg-editor -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build all plugin test targets
        run: |
          cmake --build build-vg-editor --parallel --target \
            gradus_tests plugin_tests disrumpo_tests ruinae_tests innexus_tests membrum_tests

      - name: Run editor-lifecycle tests under Valgrind/memcheck (xvfb)
        timeout-minutes: 60
        run: |
          set -e
          BINDIR="build-vg-editor/bin/${{ env.BUILD_TYPE }}"
          for bin in gradus_tests plugin_tests disrumpo_tests ruinae_tests innexus_tests membrum_tests; do
            echo "==== $bin [lifecycle] ===="
            test -x "$BINDIR/$bin" || { echo "FAIL: $BINDIR/$bin not found"; exit 1; }
            xvfb-run -a valgrind \
              --tool=memcheck \
              --error-exitcode=99 \
              --leak-check=no \
              --errors-for-leak-kinds=none \
              --undef-value-errors=no \
              --num-callers=25 \
              "$BINDIR/$bin" '[lifecycle]'
          done

      - name: Show ccache stats
        if: always()
        run: ccache --show-stats
