name: Deploy Manuals

on:
  push:
    branches: [main]
    paths:
      - 'plugins/*/MANUAL.md'
      - 'plugins/*/images/**'
      - 'plugins/*/docs/**'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy Manuals
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Pandoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pandoc

      - name: Build Manuals and Landing Pages
        env:
          REPO: ${{ github.repository }}
        run: |
          # Process all plugins that have docs
          for plugin_dir in plugins/*/; do
            [ -d "$plugin_dir" ] || continue
            plugin=$(basename "$plugin_dir")
            has_output=false

            # --- Build manual if MANUAL.md + template exist ---
            manual="$plugin_dir/MANUAL.md"
            template="$plugin_dir/docs/manual-template.html"
            if [ -f "$manual" ] && [ -f "$template" ]; then
              echo "Building manual for $plugin..."
              mkdir -p "_site/$plugin"

              # Strip the first H1 line (title is in the template header)
              sed '1{/^# /d}' "$manual" > "_build_manual.md"

              pandoc "_build_manual.md" \
                --from markdown \
                --to html5 \
                --template "$template" \
                --toc \
                --toc-depth=3 \
                --no-highlight \
                -o "_site/$plugin/manual.html"

              rm -f "_build_manual.md"
              echo "  Generated _site/$plugin/manual.html"

              # Copy images if they exist
              if [ -d "$plugin_dir/images" ]; then
                cp -r "$plugin_dir/images" "_site/$plugin/"
                echo "  Copied images to _site/$plugin/images/"
              fi
              has_output=true
            fi

            # --- Regenerate landing page if docs/index.html + version.json exist ---
            landing="$plugin_dir/docs/index.html"
            version_file="$plugin_dir/version.json"
            if [ -f "$landing" ] && [ -f "$version_file" ]; then
              echo "Regenerating landing page for $plugin..."
              mkdir -p "_site/$plugin"

              PLUGIN_NAME=$(jq -r '.name' "$version_file")
              DESCRIPTION=$(jq -r '.description' "$version_file")
              PUBLISHER=$(jq -r '.publisher' "$version_file")
              PLUGIN_URL=$(jq -r '.url // empty' "$version_file")
              # Version comes exclusively from git tags (no release tag = no landing page)
              PLUGIN_LOWER=$(echo "$PLUGIN_NAME" | tr '[:upper:]' '[:lower:]')
              TAG=$(git tag -l "${PLUGIN_LOWER}/v*" --sort=-v:refname | head -1)
              if [ -z "$TAG" ]; then
                echo "  No release tag found for $plugin — skipping landing page"
                continue
              fi
              VERSION=$(echo "$TAG" | sed 's|.*/v||')
              # URL-encode the slash for GitHub download URLs
              TAG_URL=$(echo "$TAG" | sed 's|/|%2F|g')

              DESCRIPTION_ESC=$(printf '%s\n' "$DESCRIPTION" | sed 's/[&/\]/\\&/g')
              PUBLISHER_ESC=$(printf '%s\n' "$PUBLISHER" | sed 's/[&/\]/\\&/g')
              URL_ESC=$(printf '%s\n' "$PLUGIN_URL" | sed 's/[&/\]/\\&/g')

              sed -e "s|{{VERSION}}|$VERSION|g" \
                  -e "s|{{TAG}}|$TAG_URL|g" \
                  -e "s|{{REPO}}|$REPO|g" \
                  -e "s|{{NAME}}|$PLUGIN_NAME|g" \
                  -e "s|{{DESCRIPTION}}|$DESCRIPTION_ESC|g" \
                  -e "s|{{PUBLISHER}}|$PUBLISHER_ESC|g" \
                  -e "s|{{URL}}|$URL_ESC|g" \
                  "$landing" > "_site/$plugin/index.html"

              # Copy plugin-specific assets
              cp -r "$plugin_dir/docs/assets" "_site/$plugin/" 2>/dev/null || true

              echo "  Generated _site/$plugin/index.html"
              has_output=true
            fi

            # --- Generate signal flow diagrams ---
            dot_file="$plugin_dir/docs/${plugin}_signal_flow.dot"
            if [ -f "$dot_file" ] && [ -f "tools/generate-signal-flow.js" ]; then
              mkdir -p "_site/$plugin"
              node tools/generate-signal-flow.js \
                "$dot_file" \
                "_site/$plugin/signal-flow.html"
              echo "  Generated signal flow diagram for $plugin"
            fi
          done

          # --- Generate root index from template ---
          if [ -f "docs/index-template.html" ]; then
            echo "Generating root index..."
            mkdir -p _site
            python3 << 'PYEOF'
          import json, glob, os, subprocess

          plugins = []
          for vj in sorted(glob.glob('plugins/*/version.json')):
              with open(vj) as f:
                  data = json.load(f)
              plugin_dir = os.path.basename(os.path.dirname(vj))
              data['dir'] = plugin_dir
              has_page = os.path.isfile(f'plugins/{plugin_dir}/docs/index.html')
              data['has_page'] = has_page
              plugin_lower = data['name'].lower()
              try:
                  tag = subprocess.check_output(
                      f'git tag -l "{plugin_lower}/v*" --sort=-v:refname | head -1',
                      shell=True, text=True
                  ).strip()
              except Exception:
                  tag = ''
              if not tag:
                  continue  # No release tag = unreleased plugin, skip card
              data['version'] = tag.split('/v')[-1]
              plugins.append(data)

          cards = '\n'.join([
              f'                <a href="{p["dir"]}/" class="plugin-card">'
              f'\n                    <h2>{p["name"]}</h2>'
              f'\n                    <p class="description">{p["description"]}</p>'
              f'\n                    <span class="version">v{p["version"]}</span>'
              f'\n                </a>'
              if p['has_page'] else
              f'                <div class="plugin-card">'
              f'\n                    <h2>{p["name"]}</h2>'
              f'\n                    <p class="description">{p["description"]}</p>'
              f'\n                    <span class="version">v{p["version"]}</span>'
              f'\n                </div>'
              for p in plugins
          ])

          repo = os.environ['REPO']
          with open('docs/index-template.html') as f:
              template = f.read()

          html = template.replace('{{PLUGIN_CARDS}}', cards).replace('{{REPO}}', repo)

          os.makedirs('_site', exist_ok=True)
          with open('_site/index.html', 'w') as f:
              f.write(html)
          PYEOF
            echo "  Generated _site/index.html"
          fi

          # Copy root-level site files (SEO, verification) to site root
          for f in docs/robots.txt docs/sitemap.xml docs/google*.html; do
            [ -f "$f" ] && cp "$f" "_site/$(basename "$f")"
          done

          # Copy shared root assets (favicon etc.) into _site and each plugin subdir
          if [ -d "docs/assets" ]; then
            mkdir -p "_site/assets"
            cp -r docs/assets/* "_site/assets/"
            for dir in _site/*/; do
              [ -d "$dir" ] || continue
              mkdir -p "${dir}assets"
              cp -n docs/assets/* "${dir}assets/" 2>/dev/null || true
            done
            echo "Copied shared assets (favicon, etc.) to _site/"
          fi

          # List what we built
          echo ""
          echo "Build output:"
          find _site -type f | sort

      - name: Verify download links
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Verifying download links in generated pages..."
          FAILED=0

          # Extract all GitHub release download URLs from generated HTML
          mapfile -t URLS < <(grep -roh 'https://github.com/[^"]*releases/download/[^"]*' _site/ | sort -u)

          for url in "${URLS[@]}"; do
            # Decode %2F back to / for the API check
            decoded_url=$(echo "$url" | sed 's/%2F/\//g')
            status=$(curl -s -o /dev/null -w "%{http_code}" -L --head "$decoded_url")
            if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then
              echo "  OK ($status): $url"
            else
              echo "  BROKEN ($status): $url"
              FAILED=1
            fi
          done

          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "::error::Download links are broken! Aborting deployment."
            exit 1
          fi

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_dir: ./_site
          keep_files: true
