name: Deploy Manuals

on:
  push:
    branches: [main]
    paths:
      - 'plugins/*/MANUAL.md'
      - 'plugins/*/images/**'
      - 'plugins/*/docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy Manuals
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Pandoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pandoc

      - name: Build Manuals and Landing Pages
        env:
          REPO: ${{ github.repository }}
        run: |
          # Process all plugins that have docs
          for plugin_dir in plugins/*/; do
            [ -d "$plugin_dir" ] || continue
            plugin=$(basename "$plugin_dir")
            has_output=false

            # --- Build manual if MANUAL.md + template exist ---
            manual="$plugin_dir/MANUAL.md"
            template="$plugin_dir/docs/manual-template.html"
            if [ -f "$manual" ] && [ -f "$template" ]; then
              echo "Building manual for $plugin..."
              mkdir -p "_site/$plugin"

              # Strip the first H1 line (title is in the template header)
              sed '1{/^# /d}' "$manual" > "_build_manual.md"

              pandoc "_build_manual.md" \
                --from markdown \
                --to html5 \
                --template "$template" \
                --toc \
                --toc-depth=3 \
                --no-highlight \
                -o "_site/$plugin/manual.html"

              rm -f "_build_manual.md"
              echo "  Generated _site/$plugin/manual.html"

              # Copy images if they exist
              if [ -d "$plugin_dir/images" ]; then
                cp -r "$plugin_dir/images" "_site/$plugin/"
                echo "  Copied images to _site/$plugin/images/"
              fi
              has_output=true
            fi

            # --- Regenerate landing page if docs/index.html + version.json exist ---
            landing="$plugin_dir/docs/index.html"
            version_file="$plugin_dir/version.json"
            if [ -f "$landing" ] && [ -f "$version_file" ]; then
              echo "Regenerating landing page for $plugin..."
              mkdir -p "_site/$plugin"

              PLUGIN_NAME=$(jq -r '.name' "$version_file")
              VERSION=$(jq -r '.version' "$version_file")
              DESCRIPTION=$(jq -r '.description' "$version_file")
              PUBLISHER=$(jq -r '.publisher' "$version_file")
              # Use latest git tag for this plugin, or fall back to "v$VERSION"
              TAG=$(git tag -l "${PLUGIN_NAME}-v*" --sort=-v:refname | head -1)
              [ -z "$TAG" ] && TAG="v${VERSION}"

              DESCRIPTION_ESC=$(printf '%s\n' "$DESCRIPTION" | sed 's/[&/\]/\\&/g')
              PUBLISHER_ESC=$(printf '%s\n' "$PUBLISHER" | sed 's/[&/\]/\\&/g')

              sed -e "s|{{VERSION}}|$VERSION|g" \
                  -e "s|{{TAG}}|$TAG|g" \
                  -e "s|{{REPO}}|$REPO|g" \
                  -e "s|{{NAME}}|$PLUGIN_NAME|g" \
                  -e "s|{{DESCRIPTION}}|$DESCRIPTION_ESC|g" \
                  -e "s|{{PUBLISHER}}|$PUBLISHER_ESC|g" \
                  "$landing" > "_site/$plugin/index.html"

              # Copy plugin-specific assets
              cp -r "$plugin_dir/docs/assets" "_site/$plugin/" 2>/dev/null || true

              echo "  Generated _site/$plugin/index.html"
              has_output=true
            fi

            # --- Generate signal flow diagram for ruinae ---
            if [ "$plugin" = "ruinae" ] && [ -f "plugins/ruinae/docs/ruinae_signal_flow.dot" ]; then
              if [ -f "tools/generate-signal-flow.js" ]; then
                node tools/generate-signal-flow.js \
                  plugins/ruinae/docs/ruinae_signal_flow.dot \
                  _site/ruinae/signal-flow.html
                echo "  Generated signal flow diagram"
              fi
            fi
          done

          # List what we built
          echo ""
          echo "Build output:"
          find _site -type f | sort

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_dir: ./_site
          keep_files: true
