name: CI

on:
  push:
    branches: [main]
    paths:
      - 'dsp/**'
      - 'plugins/**'
      - 'tests/**'
      - 'extern/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dsp/**'
      - 'plugins/**'
      - 'tests/**'
      - 'extern/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/ci.yml'
  workflow_call:
    # Allows this workflow to be called by release.yml
    inputs:
      plugin:
        description: 'Plugin to build (empty = all)'
        type: string
        required: false
        default: ''

# Cancel in-progress runs when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  # ccache settings (used by Linux and macOS builds)
  CCACHE_MAXSIZE: 500M
  CCACHE_COMPRESS: true
  CCACHE_COMPRESSLEVEL: 6

jobs:
  # Detect which parts of the codebase changed to run targeted tests
  # When called via workflow_call (e.g., from release.yml), run all tests
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      dsp: ${{ steps.set-outputs.outputs.dsp }}
      shared: ${{ steps.set-outputs.outputs.shared }}
      iterum: ${{ steps.set-outputs.outputs.iterum }}
      disrumpo: ${{ steps.set-outputs.outputs.disrumpo }}
      ruinae: ${{ steps.set-outputs.outputs.ruinae }}
      innexus: ${{ steps.set-outputs.outputs.innexus }}
      gradus: ${{ steps.set-outputs.outputs.gradus }}
      membrum: ${{ steps.set-outputs.outputs.membrum }}
      infra: ${{ steps.set-outputs.outputs.infra }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect file changes
        if: inputs.plugin == ''
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dsp:
              - 'dsp/**'
            shared:
              - 'plugins/shared/**'
            iterum:
              - 'plugins/iterum/**'
            disrumpo:
              - 'plugins/disrumpo/**'
            ruinae:
              - 'plugins/ruinae/**'
            innexus:
              - 'plugins/innexus/**'
            gradus:
              - 'plugins/gradus/**'
            membrum:
              - 'plugins/membrum/**'
            infra:
              - 'tests/**'
              - 'extern/**'
              - 'CMakeLists.txt'
              - 'CMakePresets.json'
              - '.github/workflows/ci.yml'

      # Set outputs: use filter results for push/PR, run all for workflow_call
      - name: Set outputs
        id: set-outputs
        run: |
          PLUGIN="${{ inputs.plugin }}"
          if [ -n "$PLUGIN" ]; then
            # Specific plugin requested (used by release.yml) — only build that plugin
            echo "dsp=false" >> $GITHUB_OUTPUT
            echo "shared=false" >> $GITHUB_OUTPUT
            echo "infra=false" >> $GITHUB_OUTPUT
            for p in iterum disrumpo ruinae innexus gradus membrum; do
              if [ "$p" = "$PLUGIN" ]; then
                echo "$p=true" >> $GITHUB_OUTPUT
              else
                echo "$p=false" >> $GITHUB_OUTPUT
              fi
            done
          else
            # No plugin specified — use file change detection (push/PR)
            echo "dsp=${{ steps.filter.outputs.dsp }}" >> $GITHUB_OUTPUT
            echo "shared=${{ steps.filter.outputs.shared }}" >> $GITHUB_OUTPUT
            echo "iterum=${{ steps.filter.outputs.iterum }}" >> $GITHUB_OUTPUT
            echo "disrumpo=${{ steps.filter.outputs.disrumpo }}" >> $GITHUB_OUTPUT
            echo "ruinae=${{ steps.filter.outputs.ruinae }}" >> $GITHUB_OUTPUT
            echo "innexus=${{ steps.filter.outputs.innexus }}" >> $GITHUB_OUTPUT
            echo "gradus=${{ steps.filter.outputs.gradus }}" >> $GITHUB_OUTPUT
            echo "membrum=${{ steps.filter.outputs.membrum }}" >> $GITHUB_OUTPUT
            echo "infra=${{ steps.filter.outputs.infra }}" >> $GITHUB_OUTPUT
          fi

  build-windows:
    name: Windows (MSVC)
    runs-on: windows-latest
    needs: detect-changes

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      # Cache CMake FetchContent downloads
      # Key includes repo name to prevent cache pollution after repo rename
      - name: Cache FetchContent
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: fetchcontent-${{ github.repository }}-${{ runner.os }}-vs-${{ hashFiles('CMakeLists.txt', 'dsp/CMakeLists.txt', 'plugins/shared/CMakeLists.txt', 'plugins/iterum/CMakeLists.txt', 'plugins/ruinae/CMakeLists.txt', 'plugins/innexus/CMakeLists.txt', 'plugins/gradus/CMakeLists.txt', 'plugins/membrum/CMakeLists.txt', 'tests/CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-${{ github.repository }}-${{ runner.os }}-vs-

      # Note: sccache/ccache with Ninja causes PDB conflicts with VSTGUI's /Zi flag
      # Visual Studio generator handles PDB files correctly via mspdbsrv.exe
      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      # Build all changed targets in a single cmake invocation.
      # MSBuild's --parallel flag builds independent targets concurrently,
      # avoiding the overhead of re-parsing the solution file per invocation.
      - name: Build All Targets
        shell: bash
        run: |
          TARGETS=""
          DSP="${{ needs.detect-changes.outputs.dsp }}"
          SHARED="${{ needs.detect-changes.outputs.shared }}"
          INFRA="${{ needs.detect-changes.outputs.infra }}"
          if [ "$DSP" = "true" ] || [ "$INFRA" = "true" ]; then
            TARGETS="$TARGETS dsp_tests"
          fi
          if [ "$SHARED" = "true" ] || [ "$INFRA" = "true" ]; then
            TARGETS="$TARGETS shared_tests"
          fi
          for plugin_info in \
            "iterum:Iterum:plugin_tests approval_tests validator" \
            "disrumpo:Disrumpo:disrumpo_tests" \
            "ruinae:Ruinae:ruinae_tests" \
            "innexus:Innexus:innexus_tests" \
            "gradus:Gradus:gradus_tests" \
            "membrum:Membrum:membrum_tests"; do
            IFS=: read -r key target extras <<< "$plugin_info"
            case "$key" in
              iterum)   CHANGED="${{ needs.detect-changes.outputs.iterum }}" ;;
              disrumpo) CHANGED="${{ needs.detect-changes.outputs.disrumpo }}" ;;
              ruinae)   CHANGED="${{ needs.detect-changes.outputs.ruinae }}" ;;
              innexus)  CHANGED="${{ needs.detect-changes.outputs.innexus }}" ;;
              gradus)   CHANGED="${{ needs.detect-changes.outputs.gradus }}" ;;
              membrum)  CHANGED="${{ needs.detect-changes.outputs.membrum }}" ;;
            esac
            if [ "$CHANGED" = "true" ] || [ "$DSP" = "true" ] || [ "$SHARED" = "true" ] || [ "$INFRA" = "true" ]; then
              TARGETS="$TARGETS $target $extras"
            fi
          done
          if [ -n "$TARGETS" ]; then
            echo "Building targets:$TARGETS"
            cmake --build build --config ${{ env.BUILD_TYPE }} --parallel --target $TARGETS
          else
            echo "No targets to build"
          fi

      # Run test executables directly in parallel.
      # Note: ctest -R "dsp_tests" doesn't work with catch_discover_tests
      # because CTest registers individual Catch2 case names, not executable names.
      - name: Run Tests
        shell: bash
        timeout-minutes: 20
        run: |
          BIN="build/bin/${{ env.BUILD_TYPE }}"
          DSP="${{ needs.detect-changes.outputs.dsp }}"
          SHARED="${{ needs.detect-changes.outputs.shared }}"
          INFRA="${{ needs.detect-changes.outputs.infra }}"
          EXES=()
          if [ "$DSP" = "true" ] || [ "$INFRA" = "true" ]; then
            EXES+=("$BIN/dsp_tests.exe")
          fi
          if [ "$SHARED" = "true" ] || [ "$INFRA" = "true" ]; then
            EXES+=("$BIN/shared_tests.exe")
          fi
          for plugin_info in \
            "iterum:plugin_tests.exe approval_tests.exe" \
            "disrumpo:disrumpo_tests.exe" \
            "ruinae:ruinae_tests.exe" \
            "innexus:innexus_tests.exe" \
            "gradus:gradus_tests.exe" \
            "membrum:membrum_tests.exe"; do
            IFS=: read -r key test_exes <<< "$plugin_info"
            case "$key" in
              iterum)   CHANGED="${{ needs.detect-changes.outputs.iterum }}" ;;
              disrumpo) CHANGED="${{ needs.detect-changes.outputs.disrumpo }}" ;;
              ruinae)   CHANGED="${{ needs.detect-changes.outputs.ruinae }}" ;;
              innexus)  CHANGED="${{ needs.detect-changes.outputs.innexus }}" ;;
              gradus)   CHANGED="${{ needs.detect-changes.outputs.gradus }}" ;;
              membrum)  CHANGED="${{ needs.detect-changes.outputs.membrum }}" ;;
            esac
            if [ "$CHANGED" = "true" ] || [ "$DSP" = "true" ] || [ "$SHARED" = "true" ] || [ "$INFRA" = "true" ]; then
              for exe in $test_exes; do
                EXES+=("$BIN/$exe")
              done
            fi
          done
          if [ ${#EXES[@]} -eq 0 ]; then
            echo "No tests to run"
            exit 0
          fi
          echo "Running ${#EXES[@]} test executables in parallel..."
          PIDS=()
          FAILED=0
          for exe in "${EXES[@]}"; do
            echo "  Starting: $(basename $exe)"
            "$exe" '~[performance]~[perf]~[!benchmark]' &
            PIDS+=($!)
          done
          for i in "${!PIDS[@]}"; do
            if ! wait "${PIDS[$i]}"; then
              echo "FAILED: ${EXES[$i]}"
              FAILED=1
            fi
          done
          exit $FAILED

      - name: Run VST3 Validator (Iterum)
        if: needs.detect-changes.outputs.iterum == 'true' || needs.detect-changes.outputs.dsp == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.infra == 'true'
        run: build/bin/${{ env.BUILD_TYPE }}/validator.exe -e build/VST3/${{ env.BUILD_TYPE }}/Iterum.vst3

      - name: Upload Iterum Artifact
        if: needs.detect-changes.outputs.iterum == 'true' || needs.detect-changes.outputs.dsp == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.infra == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: Iterum-Windows-x64
          path: build/VST3/${{ env.BUILD_TYPE }}/Iterum.vst3
          if-no-files-found: warn

      - name: Upload Disrumpo Artifact
        if: needs.detect-changes.outputs.disrumpo == 'true' || needs.detect-changes.outputs.dsp == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.infra == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: Disrumpo-Windows-x64
          path: build/VST3/${{ env.BUILD_TYPE }}/Disrumpo.vst3
          if-no-files-found: warn

      - name: Upload Ruinae Artifact
        if: needs.detect-changes.outputs.ruinae == 'true' || needs.detect-changes.outputs.dsp == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.infra == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: Ruinae-Windows-x64
          path: build/VST3/${{ env.BUILD_TYPE }}/Ruinae.vst3
          if-no-files-found: warn

      - name: Upload Innexus Artifact
        if: needs.detect-changes.outputs.innexus == 'true' || needs.detect-changes.outputs.dsp == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.infra == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: Innexus-Windows-x64
          path: build/VST3/${{ env.BUILD_TYPE }}/Innexus.vst3
          if-no-files-found: warn

      - name: Upload Gradus Artifact
        if: needs.detect-changes.outputs.gradus == 'true' || needs.detect-changes.outputs.dsp == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.infra == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: Gradus-Windows-x64
          path: build/VST3/${{ env.BUILD_TYPE }}/Gradus.vst3
          if-no-files-found: warn

      - name: Upload Membrum Artifact
        if: needs.detect-changes.outputs.membrum == 'true' || needs.detect-changes.outputs.dsp == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.infra == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: Membrum-Windows-x64
          path: build/VST3/${{ env.BUILD_TYPE }}/Membrum.vst3
          if-no-files-found: warn

  build-macos:
    name: macOS (Clang)
    runs-on: macos-latest
    needs: detect-changes

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      # Install ccache for compiler caching
      - name: Install ccache
        run: brew install ccache

      # Setup ccache with GitHub Actions cache backend
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.20
        with:
          key: macos-xcode-${{ env.BUILD_TYPE }}
          max-size: ${{ env.CCACHE_MAXSIZE }}

      # Cache CMake FetchContent downloads
      # Key includes repo name to prevent cache pollution after repo rename
      - name: Cache FetchContent
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: fetchcontent-${{ github.repository }}-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'dsp/CMakeLists.txt', 'plugins/shared/CMakeLists.txt', 'plugins/iterum/CMakeLists.txt', 'plugins/ruinae/CMakeLists.txt', 'plugins/innexus/CMakeLists.txt', 'plugins/gradus/CMakeLists.txt', 'plugins/membrum/CMakeLists.txt', 'tests/CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-${{ github.repository }}-${{ runner.os }}-

      # Use Xcode generator with ccache via TheLartians/Ccache.cmake wrapper scripts
      # This works around Xcode ignoring CMAKE_<LANG>_COMPILER_LAUNCHER
      # Note: PCH stays enabled on macOS - ccache handles it better than sccache
      # Note: SMTG_ENABLE_AUV2_BUILDS enables Audio Unit v2 build via VST3 SDK AU wrapper
      # Note: SMTG_CODE_SIGN_IDENTITY_MAC="-" uses ad-hoc signing (no keychain required in CI)
      # Note: SMTG_DISABLE_CODE_SIGNING=ON works around Xcode 16+ passing -adhoc_codesign
      #        directly to clang++ instead of via -Xlinker (VST3 SDK SMTG_CodeSign.cmake issue).
      #        The SDK's Xcode 15+ post-build codesign workaround still runs independently.
      - name: Configure CMake
        run: cmake -S . -B build -G Xcode -DUSE_CCACHE=ON -DSMTG_ENABLE_AUV2_BUILDS=ON -DSMTG_ENABLE_AUV3_BUILDS=ON -DSMTG_CODE_SIGN_IDENTITY_MAC="-" -DSMTG_DISABLE_CODE_SIGNING=ON

      # Build all changed targets in a single cmake invocation.
      # Xcode's --parallel flag builds independent targets concurrently,
      # avoiding the overhead of re-parsing the project file per invocation.
      # macOS includes AU and AUv3 targets for each plugin.
      - name: Build All Targets
        run: |
          TARGETS=""
          DSP="${{ needs.detect-changes.outputs.dsp }}"
          SHARED="${{ needs.detect-changes.outputs.shared }}"
          INFRA="${{ needs.detect-changes.outputs.infra }}"
          if [ "$DSP" = "true" ] || [ "$INFRA" = "true" ]; then
            TARGETS="$TARGETS dsp_tests"
          fi
          if [ "$SHARED" = "true" ] || [ "$INFRA" = "true" ]; then
            TARGETS="$TARGETS shared_tests"
          fi
          for plugin_info in \
            "iterum:Iterum:Iterum_AU Iterum_AUV3 plugin_tests approval_tests validator" \
            "disrumpo:Disrumpo:Disrumpo_AU Disrumpo_AUV3 disrumpo_tests" \
            "ruinae:Ruinae:Ruinae_AU Ruinae_AUV3 ruinae_tests" \
            "innexus:Innexus:Innexus_AU Innexus_AUV3 innexus_tests" \
            "gradus:Gradus:Gradus_AU Gradus_AUV3 gradus_tests" \
            "membrum:Membrum:Membrum_AU Membrum_AUV3 membrum_tests"; do
            IFS=: read -r key target extras <<< "$plugin_info"
            case "$key" in
              iterum)   CHANGED="${{ needs.detect-changes.outputs.iterum }}" ;;
              disrumpo) CHANGED="${{ needs.detect-changes.outputs.disrumpo }}" ;;
              ruinae)   CHANGED="${{ needs.detect-changes.outputs.ruinae }}" ;;
              innexus)  CHANGED="${{ needs.detect-changes.outputs.innexus }}" ;;
              gradus)   CHANGED="${{ needs.detect-changes.outputs.gradus }}" ;;
              membrum)  CHANGED="${{ needs.detect-changes.outputs.membrum }}" ;;
            esac
            if [ "$CHANGED" = "true" ] || [ "$DSP" = "true" ] || [ "$SHARED" = "true" ] || [ "$INFRA" = "true" ]; then
              TARGETS="$TARGETS $target $extras"
            fi
          done
          if [ -n "$TARGETS" ]; then
            echo "Building targets:$TARGETS"
            cmake --build build --config ${{ env.BUILD_TYPE }} --parallel --target $TARGETS
          else
            echo "No targets to build"
          fi

      # Run test executables directly in parallel (Xcode multi-config layout).
      - name: Run Tests
        timeout-minutes: 20
        run: |
          BIN="build/bin/${{ env.BUILD_TYPE }}"
          DSP="${{ needs.detect-changes.outputs.dsp }}"
          SHARED="${{ needs.detect-changes.outputs.shared }}"
          INFRA="${{ needs.detect-changes.outputs.infra }}"
          EXES=()
          if [ "$DSP" = "true" ] || [ "$INFRA" = "true" ]; then
            EXES+=("$BIN/dsp_tests")
          fi
          if [ "$SHARED" = "true" ] || [ "$INFRA" = "true" ]; then
            EXES+=("$BIN/shared_tests")
          fi
          for plugin_info in \
            "iterum:plugin_tests approval_tests" \
            "disrumpo:disrumpo_tests" \
            "ruinae:ruinae_tests" \
            "innexus:innexus_tests" \
            "gradus:gradus_tests" \
            "membrum:membrum_tests"; do
            IFS=: read -r key test_exes <<< "$plugin_info"
            case "$key" in
              iterum)   CHANGED="${{ needs.detect-changes.outputs.iterum }}" ;;
              disrumpo) CHANGED="${{ needs.detect-changes.outputs.disrumpo }}" ;;
              ruinae)   CHANGED="${{ needs.detect-changes.outputs.ruinae }}" ;;
              innexus)  CHANGED="${{ needs.detect-changes.outputs.innexus }}" ;;
              gradus)   CHANGED="${{ needs.detect-changes.outputs.gradus }}" ;;
              membrum)  CHANGED="${{ needs.detect-changes.outputs.membrum }}" ;;
            esac
            if [ "$CHANGED" = "true" ] || [ "$DSP" = "true" ] || [ "$SHARED" = "true" ] || [ "$INFRA" = "true" ]; then
              for exe in $test_exes; do
                EXES+=("$BIN/$exe")
              done
            fi
          done
          if [ ${#EXES[@]} -eq 0 ]; then
            echo "No tests to run"
            exit 0
          fi
          echo "Running ${#EXES[@]} test executables in parallel..."
          PIDS=()
          FAILED=0
          for exe in "${EXES[@]}"; do
            echo "  Starting: $(basename $exe)"
            "$exe" '~[performance]~[perf]~[!benchmark]' &
            PIDS+=($!)
          done
          for i in "${!PIDS[@]}"; do
            if ! wait "${PIDS[$i]}"; then
              echo "FAILED: ${EXES[$i]}"
              FAILED=1
            fi
          done
          exit $FAILED

      - name: Run VST3 Validator (Iterum)
        if: needs.detect-changes.outputs.iterum == 'true' || needs.detect-changes.outputs.dsp == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.infra == 'true'
        run: build/bin/${{ env.BUILD_TYPE }}/validator -e build/VST3/${{ env.BUILD_TYPE }}/Iterum.vst3

      # Install AU and run auval validation for Iterum
      - name: Run Iterum AU Validation
        if: needs.detect-changes.outputs.iterum == 'true' || needs.detect-changes.outputs.dsp == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.infra == 'true'
        run: |
          mkdir -p ~/Library/Audio/Plug-Ins/Components
          rm -rf ~/Library/Audio/Plug-Ins/Components/Iterum.component
          cp -R build/VST3/${{ env.BUILD_TYPE }}/Iterum.component ~/Library/Audio/Plug-Ins/Components/
          killall -9 AudioComponentRegistrar 2>/dev/null || true
          sleep 2
          auval -v aufx Itrm KrAt

      # Install AU and run auval validation for Disrumpo
      - name: Run Disrumpo AU Validation
        if: needs.detect-changes.outputs.disrumpo == 'true' || needs.detect-changes.outputs.dsp == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.infra == 'true'
        run: |
          mkdir -p ~/Library/Audio/Plug-Ins/Components
          rm -rf ~/Library/Audio/Plug-Ins/Components/Disrumpo.component
          cp -R build/VST3/${{ env.BUILD_TYPE }}/Disrumpo.component ~/Library/Audio/Plug-Ins/Components/
          killall -9 AudioComponentRegistrar 2>/dev/null || true
          sleep 2
          auval -v aufx Dsrm KrAt

      # Install AU and run auval validation for Ruinae
      - name: Run Ruinae AU Validation
        if: needs.detect-changes.outputs.ruinae == 'true' || needs.detect-changes.outputs.dsp == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.infra == 'true'
        run: |
          mkdir -p ~/Library/Audio/Plug-Ins/Components
          rm -rf ~/Library/Audio/Plug-Ins/Components/Ruinae.component
          cp -R build/VST3/${{ env.BUILD_TYPE }}/Ruinae.component ~/Library/Audio/Plug-Ins/Components/
          killall -9 AudioComponentRegistrar 2>/dev/null || true
          sleep 2
          auval -v aumu Ruin KrAt

      # Install AU and run auval validation for Innexus
      - name: Run Innexus AU Validation
        if: needs.detect-changes.outputs.innexus == 'true' || needs.detect-changes.outputs.dsp == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.infra == 'true'
        run: |
          mkdir -p ~/Library/Audio/Plug-Ins/Components
          rm -rf ~/Library/Audio/Plug-Ins/Components/Innexus.component
          cp -R build/VST3/${{ env.BUILD_TYPE }}/Innexus.component ~/Library/Audio/Plug-Ins/Components/
          killall -9 AudioComponentRegistrar 2>/dev/null || true
          sleep 2
          auval -v aumu Innx KrAt

      # Install AU and run auval validation for Gradus
      - name: Run Gradus AU Validation
        if: needs.detect-changes.outputs.gradus == 'true' || needs.detect-changes.outputs.dsp == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.infra == 'true'
        run: |
          mkdir -p ~/Library/Audio/Plug-Ins/Components
          rm -rf ~/Library/Audio/Plug-Ins/Components/Gradus.component
          cp -R build/VST3/${{ env.BUILD_TYPE }}/Gradus.component ~/Library/Audio/Plug-Ins/Components/
          killall -9 AudioComponentRegistrar 2>/dev/null || true
          sleep 2
          auval -v aumu Grad KrAt

      # Install AU and run auval validation for Membrum
      - name: Run Membrum AU Validation
        if: needs.detect-changes.outputs.membrum == 'true' || needs.detect-changes.outputs.dsp == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.infra == 'true'
        run: |
          mkdir -p ~/Library/Audio/Plug-Ins/Components
          rm -rf ~/Library/Audio/Plug-Ins/Components/Membrum.component
          cp -R build/VST3/${{ env.BUILD_TYPE }}/Membrum.component ~/Library/Audio/Plug-Ins/Components/
          killall -9 AudioComponentRegistrar 2>/dev/null || true
          sleep 2
          auval -v aumu Mbrm KrAt

      # Verify AUv3 bundle structure (per-plugin, matching build conditions)
      - name: Verify Iterum AUv3 Bundle
        if: needs.detect-changes.outputs.iterum == 'true' || needs.detect-changes.outputs.dsp == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.infra == 'true'
        run: |
          APP="build/bin/${{ env.BUILD_TYPE }}/Iterum AUv3.app"
          test -d "$APP" || { echo "FAIL: $APP not found"; exit 1; }
          test -d "$APP/Contents/PlugIns" || { echo "FAIL: Missing PlugIns in Iterum AUv3"; exit 1; }
          echo "[Iterum] AUv3 bundle OK"

      - name: Verify Disrumpo AUv3 Bundle
        if: needs.detect-changes.outputs.disrumpo == 'true' || needs.detect-changes.outputs.dsp == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.infra == 'true'
        run: |
          APP="build/bin/${{ env.BUILD_TYPE }}/Disrumpo AUv3.app"
          test -d "$APP" || { echo "FAIL: $APP not found"; exit 1; }
